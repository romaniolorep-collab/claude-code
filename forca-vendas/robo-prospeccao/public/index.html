<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Robô de Prospecção</title>
<style>
  :root{--ground:#EEF0F3;--surface:#fff;--surface-2:#F7F8FA;--ink:#171B21;--ink-soft:#59636E;--ink-faint:#8B949E;--line:#E4E7EC;--nav:#12283A;--accent:#0E7C86;--accent-soft:#E1F1F2;--good:#2E8B57;--good-soft:#E4F0E8;--star:#E0A500;--sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;--mono:ui-monospace,Menlo,monospace;}
  @media (prefers-color-scheme:dark){:root{--ground:#0E141A;--surface:#161D25;--surface-2:#1B242D;--ink:#E7ECF1;--ink-soft:#A4AEB8;--ink-faint:#6E7A85;--line:#26313B;--nav:#0B1720;--accent:#2AA7B0;--accent-soft:#123033;--good:#57B682;--good-soft:#16241C;--star:#E7B93a;}}
  *{box-sizing:border-box;}body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);font-size:15px;}
  .nav{background:var(--nav);color:#fff;padding:13px 20px;display:flex;align-items:center;gap:10px;}
  .nav b{background:var(--accent);width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:1rem;}
  .nav h1{margin:0;font-size:1.05rem;font-weight:800;}
  .nav .demo{margin-left:auto;font-size:.62rem;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;background:#7a5a12;color:#ffe9b0;padding:4px 9px;border-radius:999px;}
  .wrap{max-width:720px;margin:0 auto;padding:18px;}
  .search{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;gap:10px;flex-wrap:wrap;box-shadow:0 6px 20px rgba(18,40,58,.08);}
  .fld{flex:1;min-width:150px;display:flex;flex-direction:column;gap:4px;}
  .fld label{font-size:.68rem;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);}
  .fld input{border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:.95rem;background:var(--surface-2);color:var(--ink);}
  .fld input:focus{outline:2px solid var(--accent);}
  .go{align-self:flex-end;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px 20px;font-weight:800;font-size:.95rem;cursor:pointer;}
  .bar{display:flex;align-items:center;justify-content:space-between;margin:16px 2px 8px;}
  .bar .c{font-size:.85rem;color:var(--ink-soft);}
  .rota{background:var(--nav);color:#fff;border:none;border-radius:9px;padding:9px 15px;font-weight:700;font-size:.83rem;cursor:pointer;}
  .rota:disabled{opacity:.4;cursor:default;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:10px;}
  .top{display:flex;align-items:flex-start;gap:12px;}
  .chk{width:22px;height:22px;flex:none;margin-top:2px;accent-color:var(--accent);}
  .nm{font-weight:700;font-size:1rem;}
  .addr{color:var(--ink-faint);font-size:.82rem;margin-top:2px;}
  .meta{display:flex;gap:12px;align-items:center;margin-top:7px;font-size:.82rem;flex-wrap:wrap;}
  .star{color:var(--star);font-weight:700;}
  .open{color:var(--good);font-weight:600;}.closed{color:#b3541e;font-weight:600;}
  .sp{flex:1;}
  .det{margin-top:11px;padding-top:10px;border-top:1px dashed var(--line);font-size:.85rem;display:none;}
  .det.on{display:block;}
  .det .row{display:flex;gap:8px;margin-bottom:4px;}.det .k{color:var(--ink-faint);width:70px;flex:none;}
  .acts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}
  .b{border:1px solid var(--line);background:var(--surface-2);color:var(--ink-soft);border-radius:8px;padding:7px 12px;font-size:.8rem;font-weight:600;cursor:pointer;}
  .b.wa{background:#25D366;color:#0a3d1f;border:none;}
  .b.p{background:var(--accent);color:#fff;border:none;}
  .empty{text-align:center;color:var(--ink-faint);padding:30px;}
  .loading{text-align:center;color:var(--ink-faint);padding:20px;}
</style></head><body>
<div class="nav"><b>🤖</b><h1>Robô de Prospecção</h1><span class="demo" id="demoTag">demo</span></div>
<div class="wrap">
  <div class="search">
    <div class="fld"><label>Tipo de loja</label><input id="tipo" value="lojas de calçado" placeholder="lojas de calçado esportivo"></div>
    <div class="fld"><label>Local</label><input id="local" value="Maringá PR" placeholder="cidade, bairro"></div>
    <button class="go" onclick="buscar()">🔎 Buscar</button>
  </div>
  <div class="bar">
    <div class="c" id="cont">Informe o tipo e o local e clique em Buscar.</div>
    <button class="rota" id="rotaBtn" disabled onclick="rota()">🗺️ Rota (0)</button>
  </div>
  <div id="list"></div>
</div>
<script>
const DEMO = __DEMO__;
document.getElementById('demoTag').style.display = DEMO ? '' : 'none';
let leads=[]; const carteira=new Set();

async function buscar(){
  const tipo=document.getElementById('tipo').value.trim();
  const local=document.getElementById('local').value.trim();
  document.getElementById('list').innerHTML='<div class="loading">🤖 buscando…</div>';
  try{
    const r=await fetch(`/api/buscar?tipo=${encodeURIComponent(tipo)}&local=${encodeURIComponent(local)}`);
    const j=await r.json();
    if(j.erro) throw new Error(j.erro);
    leads=j.leads; carteira.clear(); render();
  }catch(e){ document.getElementById('list').innerHTML='<div class="empty">Erro: '+e.message+'</div>'; }
}

async function detalhes(i){
  const box=document.getElementById('det'+i);
  if(box.classList.contains('on')){ box.classList.remove('on'); return; }
  box.classList.add('on'); box.innerHTML='carregando…';
  const l=leads[i];
  const r=await fetch(`/api/detalhes?place_id=${encodeURIComponent(l.place_id)}`);
  const d=await r.json();
  Object.assign(l,d);
  box.innerHTML=`
    <div class="row"><span class="k">📞 Fone</span><span>${d.telefone||'—'}</span></div>
    <div class="row"><span class="k">🌐 Site</span><span>${d.site||'—'}</span></div>
    <div class="row"><span class="k">🕐 Horário</span><span>${d.horario||'—'}</span></div>
    <div class="acts">
      ${d.telefone?`<button class="b wa" onclick="zap(${i})">📲 WhatsApp</button>`:''}
      <button class="b p" onclick="salvar(${i})">➕ Salvar na carteira</button>
    </div>`;
}
function zap(i){ const t=(leads[i].telefone||'').replace(/\D/g,''); const n=t.length<=11?'55'+t:t; window.open('https://wa.me/'+n,'_blank'); }
function salvar(i){ carteira.add(i); render(); document.getElementById('det'+i)?.classList.add('on'); }
function rota(){
  const paradas=[...carteira].map(i=>leads[i].endereco).filter(Boolean);
  if(!paradas.length) return;
  window.open('https://www.google.com/maps/dir/'+paradas.map(encodeURIComponent).join('/'),'_blank');
}
function render(){
  const rb=document.getElementById('rotaBtn');
  rb.textContent=`🗺️ Rota (${carteira.size})`; rb.disabled=carteira.size===0;
  document.getElementById('cont').textContent=leads.length?`${leads.length} lojas encontradas${DEMO?' (exemplo fictício)':''}`:'Nenhuma loja encontrada.';
  document.getElementById('list').innerHTML=leads.map((l,i)=>`
    <div class="card">
      <div class="top">
        <input type="checkbox" class="chk" ${carteira.has(i)?'checked':''} onchange="${carteira.has(i)?`carteira.delete(${i})`:`carteira.add(${i})`};render()">
        <div style="flex:1">
          <div class="nm">${l.nome}</div>
          <div class="addr">${l.endereco||''}</div>
          <div class="meta">
            ${l.nota?`<span class="star">★ ${l.nota}</span><span class="muted" style="color:var(--ink-faint)">(${l.avaliacoes})</span>`:''}
            ${l.aberto===true?'<span class="open">● aberto</span>':l.aberto===false?'<span class="closed">● fechado</span>':''}
            <span class="sp"></span>
            <button class="b" onclick="detalhes(${i})">Detalhes ▾</button>
          </div>
          <div class="det" id="det${i}"></div>
        </div>
      </div>
    </div>`).join('') || '<div class="empty">Sem resultados.</div>';
}
</script></body></html>
