<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: charcoal rounded square -->
  <rect width="32" height="32" rx="7" fill="#2A2A28"/>

  <!-- "A" letterform in sage — two strokes meeting at apex -->
  <path d="M7 25 L16 9.5 L25 25"
        stroke="#7A9E7E" stroke-width="2.4" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Crossbar of the A -->
  <line x1="11.2" y1="19.5" x2="20.8" y2="19.5"
        stroke="#7A9E7E" stroke-width="2" stroke-linecap="round"/>

  <!-- Floating dot above the apex (anti-gravity concept) -->
  <circle cx="16" cy="4.5" r="2.4" fill="#C47A5A"/>

  <!-- Thin tether: dot to A peak, suggesting levitation -->
  <line x1="16" y1="6.9" x2="16" y2="9.5"
        stroke="#C47A5A" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>
</svg>
