<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cards Instagram — Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050505; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 32px; }
  h1 { color: rgba(255,255,255,0.3); font-family: Arial; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }

  .num { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: #fff; font-family: Arial; font-size: 11px; padding: 3px 8px; border-radius: 4px; }
</style>
</head>
<body>
<h1>Cards Instagram · 1080 × 1080px</h1>

  <div class="slide"><img src="cards_output/post_20260506_1339/slide_03_marca_brooks.png"><div class="num">03 · Brooks</div></div>
